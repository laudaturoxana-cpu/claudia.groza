<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 52" width="230" height="52" role="img">
  <title>Claudia Groza — Educație în Valiză</title>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&amp;family=Inter:wght@400;500&amp;display=swap');</style>
  </defs>

  <!-- FAVICON A — valiză albastră cu accent chihlimbar deasupra -->
  <!-- Corp valiză -->
  <rect x="2" y="16" width="40" height="28" rx="5" fill="#3B5E8C"/>
  <rect x="4" y="18" width="36" height="24" rx="4" fill="#2D4F7A"/>
  <!-- Mâner valiză -->
  <rect x="13" y="10" width="16" height="8" rx="3" fill="none" stroke="#3B5E8C" stroke-width="2"/>
  <rect x="12" y="14" width="18" height="5" rx="2" fill="#3B5E8C"/>
  <!-- Linie centrală valiză -->
  <rect x="2" y="28" width="40" height="2" rx="1" fill="#F7F2EB" opacity="0.12"/>
  <!-- Accent chihlimbar deasupra — romb/diamant -->
  <path d="M22 10 L26 15 L22 20 L18 15 Z" fill="#C47B2B"/>

  <!-- WORDMARK -->
  <!-- "Claudia Groza" — Playfair Display -->
  <text
    x="54"
    y="30"
    font-family="'Playfair Display', Georgia, serif"
    font-size="24"
    font-weight="400"
    fill="#1E2A3A"
    letter-spacing="0.3"
  >Claudia Groza</text>

  <!-- Linie chihlimbar — aceeași lățime ca textul "Claudia Groza" -->
  <rect x="54" y="35" width="162" height="1.5" rx="0.75" fill="#C47B2B"/>

  <!-- "Educație în Valiză" — Inter -->
  <text
    x="54"
    y="47"
    font-family="'Inter', Arial, sans-serif"
    font-size="9"
    font-weight="400"
    fill="#5A6478"
    letter-spacing="2"
  >EDUCAȚIE ÎN VALIZĂ</text>
</svg>
